  <path d="M 90 260 C 240 120, 380 400, 520 260 S 720 120, 740 260" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="2 8" stroke-linecap="round"></path>

  
  <g transform="translate(90,260)">
